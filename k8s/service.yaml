apiVersion: v1
kind: Service
metadata:
  name: weather-ml-svc
  labels:
    app: weather-ml-app
spec:
  type: NodePort
  selector:
    app: weather-ml-app
  ports:
    - name: http
      port: 5000          # service port
      targetPort: 5000    # container port
      nodePort: 30080     # minikube node port
